<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneBill Coverage Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#ffc709;
    --amber:#ffa700;
    --orange:#ff8d00;
    --deep-orange:#ff7400;
    --flame:#fe5444;
    --magenta:#e90d61;
    --ink:#1c1a1f;
    --ink-soft:#5b5761;
    --line:#ebe7ec;
    --paper:#ffffff;
    --canvas:#fff9ef;
    --good:#2fa84f;
    --bad:#fe5444;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--canvas);
    color:var(--ink);
    font-family:'Open Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }
  h1,h2,.serif{font-family:'Source Serif 4',serif;}

  .banner{
    width:100%;
    max-width:1000px;
    background:var(--paper);
    border-radius:22px;
    border:1px solid var(--line);
    box-shadow:0 18px 50px rgba(30,20,10,0.08);
    overflow:hidden;
  }
  .spectrum-bar{
    height:7px;
    position:relative;
    overflow:hidden;
    background:linear-gradient(90deg,var(--gold),var(--amber),var(--orange),var(--deep-orange),var(--flame),var(--magenta));
  }
  .spectrum-bar .shimmer{
    position:absolute;
    top:0; bottom:0; left:0;
    width:26%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
    transform:translateX(-120%);
  }
  .banner-inner{padding:28px 34px 30px;}

  .brand-row{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .brand-row img.logo{height:34px; display:block;}
  .brand-row .titles{display:flex; flex-direction:column;}
  .brand-row h1{font-size:22px; font-weight:700; margin:0; line-height:1.2; color:var(--ink);}
  .brand-row p{font-size:13.5px; color:var(--ink-soft); margin:2px 0 0;}

  .search-row{position:relative; margin-bottom:16px;}
  .search-pill{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--paper);
    border:1.5px solid var(--line);
    border-radius:999px;
    padding:6px 8px 6px 18px;
    transition:border-color .18s, box-shadow .18s;
  }
  .search-pill:focus-within{
    border-color:var(--amber);
    box-shadow:0 0 0 4px rgba(255,167,0,0.14);
  }
  .search-pill img.icon-search{width:18px; height:18px; flex:0 0 auto; opacity:0.85;}
  .search-pill input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-family:'Open Sans',sans-serif;
    font-size:15px;
    padding:11px 0;
    color:var(--ink);
    min-width:0;
  }
  .search-pill input::placeholder{color:#a7a2ad;}
  .search-btn{
    background:linear-gradient(120deg,var(--gold),var(--amber));
    border:none;
    color:#241a00;
    font-weight:700;
    font-size:13.5px;
    padding:11px 18px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    transition:filter .15s, transform .15s;
  }
  .search-btn:hover{filter:brightness(1.06);}
  .search-btn:active{transform:scale(0.97);}

  .suggestions{
    position:absolute;
    top:calc(100% + 8px);
    left:0; right:0;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    z-index:999;
    box-shadow:0 16px 40px rgba(30,20,10,0.14);
    display:none;
  }
  .suggestions.show{display:block;}
  .suggestion-item{
    padding:12px 18px;
    font-size:14px;
    cursor:pointer;
    border-bottom:1px solid var(--line);
    color:var(--ink-soft);
  }
  .suggestion-item:last-child{border-bottom:none;}
  .suggestion-item:hover, .suggestion-item.active{background:#fff6e2; color:var(--ink);}

  .result-inline{
    display:none;
    align-items:center;
    gap:12px;
    background:var(--canvas);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 18px;
    margin-bottom:16px;
    font-size:14px;
  }
  .result-inline.show{display:flex;}
  .dot{width:10px; height:10px; border-radius:50%; flex:0 0 auto;}
  .dot.yes{background:var(--good); box-shadow:0 0 0 4px rgba(47,168,79,0.16);}
  .dot.no{background:var(--bad); box-shadow:0 0 0 4px rgba(254,84,68,0.16);}
  .result-inline .rtext b{font-weight:700;}
  .result-inline .rtag{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.04em;
    font-weight:700;
    padding:2px 9px;
    border-radius:999px;
    margin-left:8px;
  }
  .rtag.metropolitan{background:#fde8f1; color:var(--magenta);}
  .rtag.district{background:#ffe9d6; color:var(--deep-orange);}
  .rtag.local{background:#fff3d0; color:#a97300;}

  .fallback-note{
    display:none;
    background:#fff1ef;
    border:1px solid rgba(254,84,68,0.28);
    border-radius:14px;
    padding:14px 18px;
    font-size:13.5px;
    color:#8a2c22;
    margin-bottom:16px;
  }
  .fallback-note.show{display:block;}

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    color:#a7a2ad;
    font-size:11.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-weight:700;
    margin:20px 0 14px;
  }
  .divider::before, .divider::after{content:''; flex:1; height:1px; background:var(--line);}

  .dropdown-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  select{
    flex:1;
    min-width:180px;
    appearance:none;
    background:var(--paper) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%235b5761" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 14px center;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:12px 38px 12px 14px;
    font-family:'Open Sans',sans-serif;
    font-size:14px;
    color:var(--ink);
    cursor:pointer;
    transition:border-color .18s;
  }
  select:focus{outline:none; border-color:var(--amber);}
  select:disabled{color:#b8b3bf; cursor:not-allowed;}

  .dropdown-status{
    display:none;
    align-items:center;
    gap:8px;
    padding:10px 16px;
    border-radius:12px;
    border:1.5px solid var(--line);
    font-size:13.5px;
    font-weight:600;
    white-space:nowrap;
  }
  .dropdown-status.show{display:flex;}

  footer{
    text-align:center;
    padding:16px 10px 0;
    font-size:11.5px;
    color:#b8b3bf;
  }

  @media (max-width:600px){
    .banner-inner{padding:22px 20px 24px;}
    .search-pill{flex-wrap:wrap;}
    .search-btn{width:100%;}
    .dropdown-row{flex-direction:column;}
    select{min-width:100%;}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

let MUNI_DATA = [];
let MUNI_BY_NAME = {};

const REDUCE_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const BRAND_COLORS = ['#ffc709','#ffa700','#ff8d00','#ff7400','#fe5444','#e90d61'];

function playEntrance(){
  if(REDUCE_MOTION || !window.gsap){ return; }
  gsap.set('.banner', {opacity:1});
  gsap.from('.banner', {opacity:0, y:22, duration:0.55, ease:'power2.out'});
  gsap.from(['.brand-row','.search-row','.divider','.dropdown-row'], {
    opacity:0, y:10, duration:0.45, ease:'power2.out', stagger:0.09, delay:0.12
  });
  gsap.to('.spectrum-bar .shimmer', {
    left:'120%', duration:2.6, ease:'power1.inOut', repeat:-1, repeatDelay:1.4
  });
}

function celebrate(originEl){
  if(REDUCE_MOTION || !window.confetti) return;
  let x = 0.5, y = 0.35;
  if(originEl){
    const r = originEl.getBoundingClientRect();
    x = (r.left + r.width/2) / window.innerWidth;
    y = (r.top + r.height/2) / window.innerHeight;
  }
  confetti({
    particleCount:46,
    spread:60,
    startVelocity:32,
    scalar:0.85,
    origin:{x, y},
    colors:BRAND_COLORS
  });
}

function popIn(el){
  if(REDUCE_MOTION || !window.gsap){ return; }
  gsap.fromTo(el, {opacity:0, scale:0.92, y:6}, {opacity:1, scale:1, y:0, duration:0.4, ease:'back.out(1.7)'});
}

function normalize(s){
  return (s||'')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}
function shortName(name){
  return name.replace(/ Local Municipality.*$| Metropolitan Municipality| District Municipality/g,'').trim();
}
function typeClass(type){
  return (type||'').toLowerCase();
}

async function loadData(){
  try{
    const res = await fetch('./data.json', {cache:'no-store'});
    MUNI_DATA = await res.json();
  }catch(e){
    document.getElementById('provinceSelect').innerHTML = '<option>Could not load data.json</option>';
    return;
  }
  MUNI_DATA.forEach(m => MUNI_BY_NAME[m.name] = m);
  populateProvinces();
}

function populateProvinces(){
  const sel = document.getElementById('provinceSelect');
  const provinces = [...new Set(MUNI_DATA.map(m=>m.province))].sort();
  provinces.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
}

document.getElementById('provinceSelect').addEventListener('change', (e) => {
  const province = e.target.value;
  const muniSel = document.getElementById('municipalitySelect');
  const statusEl = document.getElementById('dropdownStatus');
  statusEl.classList.remove('show');
  muniSel.innerHTML = '<option value="">Select municipality&hellip;</option>';
  if(!province){ muniSel.disabled = true; return; }
  const items = MUNI_DATA.filter(m => m.province === province)
    .sort((a,b) => shortName(a.name).localeCompare(shortName(b.name)));
  items.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.name; opt.textContent = shortName(m.name) + ' (' + m.type + ')';
    muniSel.appendChild(opt);
  });
  muniSel.disabled = false;
});

document.getElementById('municipalitySelect').addEventListener('change', (e) => {
  const statusEl = document.getElementById('dropdownStatus');
  const name = e.target.value;
  if(!name){ statusEl.classList.remove('show'); return; }
  const m = MUNI_BY_NAME[name];
  const dot = document.getElementById('dropdownDot');
  const text = document.getElementById('dropdownStatusText');
  dot.className = 'dot ' + (m.available ? 'yes' : 'no');
  text.textContent = m.available ? 'OneBill is available here' : 'Not yet in coverage';
  statusEl.classList.add('show');
  popIn(statusEl);
  if(m.available) celebrate(statusEl);
});

// --- Address search (Nominatim) ---
const input = document.getElementById('addressInput');
const suggestionsEl = document.getElementById('suggestions');
let debounceTimer = null;
let activeIndex = -1;
let currentSuggestions = [];

async function fetchSuggestions(q){
  if(q.trim().length < 3){ hideSuggestions(); return; }
  try{
    const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&countrycodes=za&q=${encodeURIComponent(q)}`;
    const res = await fetch(url, {headers:{'Accept-Language':'en'}});
    currentSuggestions = await res.json();
    renderSuggestions(currentSuggestions);
  }catch(e){ hideSuggestions(); }
}
function renderSuggestions(results){
  if(!results.length){ hideSuggestions(); return; }
  suggestionsEl.innerHTML = results.map((r,i) => `<div class="suggestion-item" data-index="${i}">${r.display_name}</div>`).join('');
  suggestionsEl.classList.add('show');
  activeIndex = -1;
  [...suggestionsEl.children].forEach(el=>{
    el.addEventListener('click', ()=>{
      selectResult(currentSuggestions[parseInt(el.getAttribute('data-index'))]);
    });
  });
}
function hideSuggestions(){ suggestionsEl.classList.remove('show'); suggestionsEl.innerHTML=''; }

input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const q = input.value;
  debounceTimer = setTimeout(() => fetchSuggestions(q), 400);
});
input.addEventListener('keydown', (e) => {
  const items = [...suggestionsEl.children];
  if(e.key === 'ArrowDown'){ e.preventDefault(); activeIndex = Math.min(activeIndex+1, items.length-1); updateActive(items); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); activeIndex = Math.max(activeIndex-1, 0); updateActive(items); }
  else if(e.key === 'Enter'){
    e.preventDefault();
    if(activeIndex >= 0 && currentSuggestions[activeIndex]) selectResult(currentSuggestions[activeIndex]);
    else if(currentSuggestions.length) selectResult(currentSuggestions[0]);
    else fetchSuggestions(input.value).then(()=>{ if(currentSuggestions.length) selectResult(currentSuggestions[0]); });
  }
});
function updateActive(items){
  items.forEach(el=>el.classList.remove('active'));
  if(items[activeIndex]) items[activeIndex].classList.add('active');
}
document.getElementById('searchBtn').addEventListener('click', () => {
  if(currentSuggestions.length) selectResult(currentSuggestions[0]);
  else fetchSuggestions(input.value).then(()=>{ if(currentSuggestions.length) selectResult(currentSuggestions[0]); });
});
document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-row')) hideSuggestions();
});

function selectResult(r){
  hideSuggestions();
  input.value = r.display_name;
  const muni = matchMunicipality(r.address || {});
  showResult(r.display_name, muni, r.address || {});
}

function matchMunicipality(addr){
  const candidates = [addr.city, addr.town, addr.village, addr.suburb, addr.municipality, addr.county, addr.state_district];
  for(const c of candidates){
    if(!c) continue;
    const key = normalize(c);
    if(SEAT_TO_MUNI[key]) return MUNI_BY_NAME[SEAT_TO_MUNI[key]];
  }
  for(const c of candidates){
    if(!c) continue;
    const nc = normalize(c);
    const found = MUNI_DATA.find(m => normalize(shortName(m.name)) === nc);
    if(found) return found;
  }
  const province = normalize(addr.state || '');
  if(province){
    const inProvince = MUNI_DATA.filter(m => normalize(m.province) === province);
    for(const c of candidates){
      if(!c) continue;
      const nc = normalize(c);
      const found = inProvince.find(m => nc.includes(normalize(shortName(m.name))) || normalize(shortName(m.name)).includes(nc));
      if(found) return found;
    }
  }
  return null;
}

function showResult(searchedText, muni, addr){
  const resultInline = document.getElementById('resultInline');
  const fallback = document.getElementById('fallbackNote');
  fallback.classList.remove('show');

  if(!muni){
    resultInline.classList.remove('show');
    const province = addr.state || null;
    fallback.innerHTML = "Couldn't pinpoint the exact municipality for <b>" + searchedText + "</b>." +
      (province ? (" It looks like it's in <b>" + province + "</b> &mdash; use the dropdowns below to find it.") : " Use the dropdowns below instead.");
    fallback.classList.add('show');
    if(province){
      const provSel = document.getElementById('provinceSelect');
      const match = [...provSel.options].find(o => normalize(o.value) === normalize(province));
      if(match){ provSel.value = match.value; provSel.dispatchEvent(new Event('change')); }
    }
    return;
  }

  const dot = document.getElementById('resultDot');
  const text = document.getElementById('resultText');
  dot.className = 'dot ' + (muni.available ? 'yes' : 'no');
  text.innerHTML = '<b>' + shortName(muni.name) + '</b> &middot; ' + muni.province +
    '<span class="rtag ' + typeClass(muni.type) + '">' + muni.type + '</span>' +
    ' &mdash; ' + (muni.available ? 'OneBill is available here' : 'Not yet in coverage');
  resultInline.classList.add('show');
  popIn(resultInline);
  if(muni.available) celebrate(resultInline);
}

loadData();
playEntrance();
</script>
